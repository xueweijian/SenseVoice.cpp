name: Build SenseVoice

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows-cpu:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Prepare artifacts
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item build\bin\Release\sense-voice-main.exe artifacts/sense-voice-cpu-win-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-cpu-win-x64
          path: artifacts/

  build-linux-cpu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/bin/sense-voice-main artifacts/sense-voice-cpu-linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-cpu-linux-x64
          path: artifacts/
