name: Build SenseVoice (Windows First)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows-cuda:
    runs-on: windows-2019
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CUDA 11.8
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '11.8.0'

      - name: Configure with Visual Studio
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Visual Studio 16 2019" -A x64 -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=60

      - name: Build
        shell: cmd
        run: cmake --build build --config Release -j

      - name: Prepare artifacts
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item build\bin\Release\sense-voice-main.exe artifacts\sense-voice-cuda-win-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-cuda-win-x64
          path: artifacts/

  build-windows-vulkan:
    runs-on: windows-2019
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download and Install Vulkan SDK
        shell: powershell
        run: |
          Write-Host "Downloading Vulkan SDK..."
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.261.1/windows/VulkanSDK-1.3.261.1-Installer.exe" -OutFile "VulkanSDK.exe" -UseBasicParsing
          Write-Host "Installing Vulkan SDK..."
          Start-Process -FilePath ".\VulkanSDK.exe" -ArgumentList "/S" -NoNewWindow -Wait
          Write-Host "Vulkan SDK installed"

      - name: Configure with Visual Studio
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          set VULKAN_SDK=C:\VulkanSDK\1.3.261.1
          cmake -S . -B build -G "Visual Studio 16 2019" -A x64 -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON

      - name: Build
        shell: cmd
        run: cmake --build build --config Release -j

      - name: Prepare artifacts
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item build\bin\Release\sense-voice-main.exe artifacts\sense-voice-vulkan-win-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-win-x64
          path: artifacts/

  build-linux-cuda:
    runs-on: ubuntu-latest
    container: nvidia/cuda:11.8.0-devel-ubuntu22.04
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=60

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/bin/sense-voice-main artifacts/sense-voice-cuda-linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-cuda-linux-x64
          path: artifacts/

  build-linux-vulkan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev vulkan-tools

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/bin/sense-voice-main artifacts/sense-voice-vulkan-linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-linux-x64
          path: artifacts/
