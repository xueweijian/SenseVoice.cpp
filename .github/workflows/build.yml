name: Build SenseVoice

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows-cuda:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '11.8.0'

      - name: Configure
        run: |
          cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES="60;61;70;75;80;86;89;90"

      - name: Build
        run: cmake --build build --config Release -j

      - name: Prepare artifacts
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item build/bin/Release/sense-voice-main.exe artifacts/sense-voice-cuda-win-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-cuda-win-x64
          path: artifacts/

  build-windows-vulkan:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Vulkan SDK
        run: |
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.3.283.0/windows/VulkanSDK-1.3.283.0-Installer.exe" -OutFile "VulkanSDK.exe"

      - name: Install Vulkan SDK
        run: |
          Start-Process -FilePath "VulkanSDK.exe" -ArgumentList "/S" -Wait

      - name: Configure
        run: |
          $env:VULKAN_SDK = "C:\VulkanSDK\1.3.283.0"
          cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Prepare artifacts
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item build/bin/Release/sense-voice-main.exe artifacts/sense-voice-vulkan-win-x64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-win-x64
          path: artifacts/

  build-linux-cuda:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CUDA Toolkit
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/wsl-ubuntu/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get -y install cuda-11-8

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES="60;61;70;75;80;86;89;90"

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/bin/sense-voice-main artifacts/sense-voice-cuda-linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-cuda-linux-x64
          path: artifacts/

  build-linux-vulkan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake vulkan-sdk libvulkan-dev glslang-tools spirv-tools

      - name: Configure
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGGML_VULKAN=ON

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/bin/sense-voice-main artifacts/sense-voice-vulkan-linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sense-voice-vulkan-linux-x64
          path: artifacts/
